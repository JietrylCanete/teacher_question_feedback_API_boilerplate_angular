<div *ngIf="alerts.length" class="global-alert-stack" aria-live="polite" aria-atomic="true">
    <div *ngFor="let alert of alerts" class="{{cssClasses(alert)}}">
        <span [innerHTML]="alert.message"></span>
        <button type="button" class="btn-close" (click)="removeAlert(alert)" aria-label="Close"></button>
    </div>
</div>

<div class="my-questions-container">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="display-6 fw-bold text-primary mb-2">
        <i class="bi bi-journal-bookmark-fill me-2"></i>My Questions
      </h1>
      <p class="text-secondary">Questions you've created</p>
    </div>
    <a routerLink="/classroom/create" class="btn btn-primary">
      <i class="bi bi-plus-circle me-2"></i>Create New
    </a>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3 text-secondary">Loading your questions...</p>
  </div>

  <!-- Questions List -->
  <div *ngIf="!loading && questions.length > 0" class="questions-list">
    <div *ngFor="let question of questions" class="question-item">
      <div class="question-card">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <span class="badge bg-primary">
            <i class="bi bi-question-circle me-1"></i>
            Question #{{question.questionId}}
          </span>
        </div>

        <p class="question-text mb-3">{{ question.questionText }}</p>

        <div class="d-flex justify-content-between align-items-center">
          <div class="stats">
            <span class="badge bg-info me-2">
              <i class="bi bi-people me-1"></i>
              {{ question.answerCount || 0 }} Answers
            </span>
          </div>

          <div class="actions">
           
            <button class="btn btn-sm btn-outline-danger" 
                    (click)="deleteQuestion(question.questionId)">
              <i class="bi bi-trash me-1"></i>Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!loading && questions.length === 0" class="text-center py-5">
    <div class="empty-state mb-4">
      <i class="bi bi-journal-x" style="font-size: 4rem; color: #dee2e6;"></i>
    </div>
    <h3 class="h4 text-secondary mb-3">No Questions Yet</h3>
    <p class="text-secondary mb-4">Start by creating your first question</p>
    <a routerLink="/classroom/create" class="btn btn-primary btn-lg">
      <i class="bi bi-plus-circle me-2"></i>Create Question
    </a>
  </div>
</div>
